name: Build musl-gcc cross toolchains

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag used when manually dispatching (example: v1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: "${{ matrix.host.id }} -> ${{ matrix.target.id }}"
    runs-on: ${{ matrix.host.runner }}
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        host:
          - id: ubuntu-x86_64
            runner: ubuntu-24.04
            host_os: linux
            host_arch: x86_64
          - id: ubuntu-aarch64
            runner: ubuntu-24.04-arm
            host_os: linux
            host_arch: aarch64
          - id: macos-aarch64
            runner: macos-14
            host_os: darwin
            host_arch: aarch64
        target:
          - id: x86_64-linux-musl
            tuple: x86_64-linux-musl
          - id: aarch64-linux-musl
            tuple: aarch64-linux-musl
          - id: riscv64-linux-musl
            tuple: riscv64-linux-musl
          - id: loongarch64-linux-musl
            tuple: loongarch64-linux-musl

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            curl \
            wget \
            xz-utils \
            bzip2 \
            patch \
            bison \
            flex \
            texinfo \
            gawk \
            help2man \
            file \
            python3 \
            git \
            libgmp-dev \
            libmpfr-dev \
            libmpc-dev \
            libisl-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          set -eux
          brew update
          brew install \
            gnu-sed \
            gawk \
            wget \
            gmp \
            mpfr \
            libmpc \
            isl \
            texinfo \
            bison \
            flex
          echo "$(brew --prefix gnu-sed)/libexec/gnubin" >> "$GITHUB_PATH"
          echo "$(brew --prefix bison)/bin" >> "$GITHUB_PATH"
          echo "$(brew --prefix flex)/bin" >> "$GITHUB_PATH"

      - name: Restore musl-cross-make source cache
        id: source-cache
        uses: actions/cache/restore@v4
        with:
          path: mcm-sources-cache
          key: mcm-sources-${{ runner.os }}-${{ runner.arch }}-binutils-2.44-gcc-9.4.0-musl-1.2.5-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            mcm-sources-${{ runner.os }}-${{ runner.arch }}-binutils-2.44-gcc-9.4.0-musl-1.2.5-

      - name: Clone musl-cross-make
        run: |
          set -eux
          git clone --depth 1 https://github.com/richfelker/musl-cross-make.git musl-cross-make
          mkdir -p musl-cross-make/sources
          if [ -d mcm-sources-cache ]; then
            cp -a mcm-sources-cache/. musl-cross-make/sources/ || true
          fi

      - name: Build toolchain
        run: |
          set -eu
          cd musl-cross-make

          LOG_DIR="$PWD/ci-logs"
          mkdir -p "$LOG_DIR"
          error_pattern='(error:|fatal error:|collect2: error:|undefined reference|ld: cannot find)'

          print_error_log() {
            log_file="$1"
            matched=0

            if [ -s "$log_file" ]; then
              if grep -E -i "$error_pattern" "$log_file"; then
                matched=1
              fi
            fi

            if [ "$matched" -eq 0 ]; then
              echo "No explicit error lines matched. Showing log tail:" >&2
              tail -n 120 "$log_file" >&2 || true
            fi
          }

          print_error_context() {
            log_file="$1"
            max_hits=5
            before_lines=8
            after_lines=4

            if [ ! -s "$log_file" ]; then
              echo "No log file available for context: $log_file" >&2
              return
            fi

            awk -v pattern="$error_pattern" -v max_hits="$max_hits" -v before="$before_lines" -v after="$after_lines" '
              BEGIN { IGNORECASE = 1 }
              {
                lines[NR] = $0
              }
              $0 ~ pattern {
                hits[++hit_count] = NR
              }
              END {
                if (hit_count == 0) {
                  start = NR - 120
                  if (start < 1) start = 1
                  for (i = start; i <= NR; i++) {
                    printf "    %6d | %s\\n", i, lines[i]
                  }
                  exit
                }

                shown = hit_count
                if (shown > max_hits) shown = max_hits

                for (h = 1; h <= shown; h++) {
                  line = hits[h]
                  start = line - before
                  if (start < 1) start = 1
                  end = line + after
                  if (end > NR) end = NR

                  printf "---- context around error at line %d ----\\n", line
                  for (i = start; i <= end; i++) {
                    prefix = (i == line) ? ">>" : "  "
                    printf "%s %6d | %s\\n", prefix, i, lines[i]
                  }
                  if (h < shown) print ""
                }

                if (hit_count > max_hits) {
                  printf "\\nMore than %d error matches found; only first %d shown.\\n", max_hits, max_hits
                }
              }
            ' "$log_file"
          }

          cat > config.mak <<EOF
          TARGET = ${{ matrix.target.tuple }}
          OUTPUT = $PWD/output
          GNU_SITE = https://ftp.gnu.org/gnu
          DL_CMD = wget -c --tries=10 --waitretry=3 --retry-connrefused --retry-on-http-error=429,500,502,503,504 -O
          EOF

          if command -v nproc >/dev/null 2>&1; then
            JOBS=$(nproc)
          else
            JOBS=$(sysctl -n hw.logicalcpu)
          fi

          if [ "$JOBS" -gt 1 ]; then
            JOBS=$((JOBS - 1))
          fi

          attempt=1
          max_attempts=3
          while [ "$attempt" -le "$max_attempts" ]; do
            build_log="$LOG_DIR/make-attempt-${attempt}.log"

            if make -j"$JOBS" V=1 >"$build_log" 2>&1; then
              echo "Build succeeded on attempt ${attempt}/${max_attempts}"
              break
            fi

            echo "Build attempt ${attempt}/${max_attempts} failed" >&2
            echo "::group::Build errors (attempt ${attempt})"
            print_error_log "$build_log"
            echo "::endgroup::"
            echo "::group::Build error context (attempt ${attempt})"
            print_error_context "$build_log"
            echo "::endgroup::"

            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "Build failed after ${max_attempts} attempts" >&2
              exit 1
            fi

            attempt=$((attempt + 1))
            echo "Retrying build attempt ${attempt}/${max_attempts} after transient failure" >&2
            sleep 10
          done

          install_log="$LOG_DIR/make-install.log"
          if ! make V=1 install >"$install_log" 2>&1; then
            echo "make install failed" >&2
            echo "::group::Install errors"
            print_error_log "$install_log"
            echo "::endgroup::"
            echo "::group::Install error context"
            print_error_context "$install_log"
            echo "::endgroup::"
            exit 1
          fi

      - name: Validate compiler
        run: |
          set -eux
          CC="musl-cross-make/output/bin/${{ matrix.target.tuple }}-gcc"
          test -x "$CC"
          "$CC" -dumpmachine
          "$CC" --version

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ matrix.target.id }}-host-${{ matrix.host.host_os }}-${{ matrix.host.host_arch }}
          path: |
            musl-cross-make/build/**/build.log
            musl-cross-make/build/**/*.log
            musl-cross-make/ci-logs/*.log
          if-no-files-found: ignore

      - name: Update source cache
        run: |
          set -eux
          rm -rf mcm-sources-cache
          mkdir -p mcm-sources-cache
          cp -a musl-cross-make/sources/. mcm-sources-cache/

      - name: Save musl-cross-make source cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: mcm-sources-cache
          key: ${{ steps.source-cache.outputs.cache-primary-key }}

      - name: Package artifact
        run: |
          set -eux
          mkdir -p dist
          ASSET="musl-gcc-${{ matrix.target.id }}-host-${{ matrix.host.host_os }}-${{ matrix.host.host_arch }}"

          tar -C musl-cross-make -czf "dist/${ASSET}.tar.gz" output

          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "dist/${ASSET}.tar.gz" > "dist/${ASSET}.tar.gz.sha256"
          else
            shasum -a 256 "dist/${ASSET}.tar.gz" > "dist/${ASSET}.tar.gz.sha256"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: musl-gcc-${{ matrix.target.id }}-host-${{ matrix.host.host_os }}-${{ matrix.host.host_arch }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error

  release:
    name: Publish release assets
    needs: build
    runs-on: ubuntu-24.04
    if: ${{ needs.build.result == 'success' }}

    steps:
      - name: Resolve release tag
        id: resolve_tag
        run: |
          set -eux
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ inputs.release_tag }}" ]; then
            echo "tag=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "release_tag is required for workflow_dispatch" >&2
            exit 1
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: musl-gcc-*
          merge-multiple: true
          path: release-assets

      - name: Ensure all 12 artifacts exist
        run: |
          set -eux
          count=$(find release-assets -maxdepth 1 -name '*.tar.gz' | wc -l | tr -d ' ')
          test "$count" -eq 12

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve_tag.outputs.tag }}
          name: ${{ steps.resolve_tag.outputs.tag }}
          generate_release_notes: true
          files: |
            release-assets/*.tar.gz
            release-assets/*.sha256
          fail_on_unmatched_files: true
